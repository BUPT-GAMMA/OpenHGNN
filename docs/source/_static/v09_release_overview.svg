      <text x="269" y="54" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#16a34a">17</text>
      <text x="269" y="92" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Tasks</text>
