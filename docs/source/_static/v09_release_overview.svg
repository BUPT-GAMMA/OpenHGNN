    <text x="56" y="94" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">OpenHGNN v0.9</text>
    <text x="56" y="135" font-family="Inter, Arial, sans-serif" font-size="22" fill="#475569">Documentation-first, DGL-first, reproducible heterogeneous graph learning</text>

