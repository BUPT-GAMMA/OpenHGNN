  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M130 505 C265 395 330 565 460 455 S690 310 825 405 1025 475 1110 330" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.32"/>
